<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Manager</title>
    <style>
        body { font-family: Calibri, sans-serif; padding: 15px; font-size: 14px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .btn-csv { background: #ff9800; }
        .hidden { display: none; }
        .user-info { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #999; padding: 4px; text-align: left; }
        th { background-color: #eee; }
        @media print {
            .no-print { display: none; }
            body { font-family: Calibri, sans-serif; }
            @page { size: A4 portrait; margin: 10mm; }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Initial Setup</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="whatsapp" placeholder="WhatsApp Number">
        <button onclick="saveUser()">Save</button>
    </div>

    <div id="appPage" class="hidden">
        <div id="userInfo" class="user-info"></div>
        <div class="card">
            <input type="text" id="locationDesc" placeholder="Site Location">
            <button class="btn-wa" onclick="markAttendance()">Mark Attendance</button>
            <button onclick="showReportUI()">Generate Report</button>
        </div>
    </div>

    <div id="reportPage" class="hidden">
        <div class="no-print">
            <button onclick="window.print()">Export to PDF</button>
            <button class="btn-csv" onclick="exportCSV()">Export to CSV</button>
            <button style="background: #dc3545;" onclick="goBack()">Back</button>
        </div>
        <div id="reportHeader" class="user-info"></div>
        <div id="reportContent"></div>
    </div>

    <script>
        if (localStorage.getItem('user')) showDashboard();

        function saveUser() {
            const user = { name: document.getElementById('name').value, email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value };
            localStorage.setItem('user', JSON.stringify(user));
            location.reload();
        }

        function showDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('userInfo').innerHTML = `<strong>${user.name}</strong> | ${user.email} | ${user.whatsapp}`;
        }

        function markAttendance() {
            if (!navigator.geolocation) return alert("Geolocation not supported.");
            navigator.geolocation.getCurrentPosition(pos => {
                const user = JSON.parse(localStorage.getItem('user'));
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const entry = { time: new Date().toLocaleString(), desc: document.getElementById('locationDesc').value || 'N/A', link: mapLink };
                
                let logs = JSON.parse(localStorage.getItem('logs') || '[]');
                logs.push(entry);
                localStorage.setItem('logs', JSON.stringify(logs));
                
                // Fixed: Explicitly opening WhatsApp after saving
                const msg = `Attendance: ${user.name}, Site: ${entry.desc}, Loc: ${mapLink}`;
                window.location.href = `https://wa.me/9823038877?text=${encodeURIComponent(msg)}`;
            });
        }

        function showReportUI() {
            document.getElementById('appPage').classList.add('hidden');
            document.getElementById('reportPage').classList.remove('hidden');
            const user = JSON.parse(localStorage.getItem('user'));
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            
            // Fixed: Added user info to the report header for PDF printing
            document.getElementById('reportHeader').innerHTML = `<strong>${user.name}</strong> | ${user.email} | ${user.whatsapp}`;
            
            let html = `<h3>Attendance Report</h3><table><tr><th>Time</th><th>Site</th><th>Map</th></tr>`;
            logs.forEach(log => {
                html += `<tr><td>${log.time}</td><td>${log.desc}</td><td><a href="${log.link}" target="_blank">View Map</a></td></tr>`;
            });
            html += `</table>`;
            document.getElementById('reportContent').innerHTML = html;
        }

        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            let csv = 'Time,Site,Map\n';
            logs.forEach(l => csv += `"${l.time}","${l.desc}","${l.link}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'attendance.csv';
            a.click();
        }

        function goBack() {
            document.getElementById('reportPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
        }
    </script>
</body>
</html>
