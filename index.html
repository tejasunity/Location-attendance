<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Attendance Manager</title>
    <style>
        :root {
            --navy: #1a2b4a;
            --blue: #2563eb;
            --blue-light: #eff6ff;
            --blue-mid: #dbeafe;
            --grey-1: #f8f9fb;
            --grey-2: #e5e7eb;
            --grey-3: #9ca3af;
            --grey-4: #4b5563;
            --white: #ffffff;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow: 0 2px 12px rgba(26,43,74,0.10);
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Calibri, sans-serif;
            background: var(--grey-1);
            color: var(--navy);
            min-height: 100vh;
        }

        /* ── TOP HEADER BAR ── */
        .app-header {
            background: var(--navy);
            color: white;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .app-header .logo {
            width: 36px; height: 36px;
            background: var(--blue);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: white;
            letter-spacing: -0.5px;
        }
        .app-header .title-block h1 {
            font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
        }
        .app-header .title-block p {
            font-size: 11px; color: #93c5fd; margin-top: 1px;
        }

        /* ── MAIN WRAPPER ── */
        .page { padding: 18px; max-width: 480px; margin: 0 auto; }
        .hidden { display: none !important; }

        /* ── CARDS ── */
        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--grey-2);
        }
        .card-title {
            font-size: 11px; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: var(--grey-3); margin-bottom: 14px;
        }

        /* ── INPUTS ── */
        .field { margin-bottom: 12px; }
        .field label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--grey-4); margin-bottom: 4px; letter-spacing: 0.4px;
        }
        .field input {
            width: 100%; padding: 10px 12px;
            border: 1.5px solid var(--grey-2);
            border-radius: 7px; font-size: 14px;
            color: var(--navy); background: var(--grey-1);
            outline: none; transition: border-color 0.2s;
            font-family: inherit;
        }
        .field input:focus { border-color: var(--blue); background: white; }

        /* ── BUTTONS ── */
        .btn {
            width: 100%; padding: 12px;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; letter-spacing: 0.3px;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn + .btn { margin-top: 10px; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-pdf { background: var(--navy); color: white; }
        .btn-csv { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline {
            background: white; color: var(--navy);
            border: 1.5px solid var(--grey-2);
        }

        /* ── USER INFO PILL ── */
        .user-pill {
            background: var(--blue-light);
            border: 1px solid var(--blue-mid);
            border-radius: 8px;
            padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }
        .user-avatar {
            width: 38px; height: 38px;
            background: var(--blue); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: white;
            flex-shrink: 0;
        }
        .user-details strong { font-size: 14px; display: block; color: var(--navy); }
        .user-details span { font-size: 11px; color: var(--grey-4); }

        /* ── STATUS TOAST ── */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            background: var(--navy); color: white;
            padding: 10px 20px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 999;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; }

        /* ── REPORT TABLE ── */
        .report-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .report-table th {
            background: var(--navy); color: white;
            padding: 8px 10px; text-align: left;
            font-size: 11px; letter-spacing: 0.5px;
        }
        .report-table th:first-child { border-radius: 6px 0 0 0; }
        .report-table th:last-child { border-radius: 0 6px 0 0; }
        .report-table td { padding: 8px 10px; border-bottom: 1px solid var(--grey-2); color: var(--grey-4); }
        .report-table tr:nth-child(even) td { background: var(--grey-1); }
        .report-table a { color: var(--blue); text-decoration: none; font-weight: 600; }

        .report-meta {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 14px;
        }
        .meta-box {
            background: var(--blue-light);
            border: 1px solid var(--blue-mid);
            border-radius: 7px; padding: 10px 12px;
        }
        .meta-box .label { font-size: 10px; color: var(--grey-3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .meta-box .value { font-size: 15px; font-weight: 700; color: var(--navy); margin-top: 2px; }

        /* ── PRINT STYLES ── */
        @media print {
            .no-print { display: none !important; }
            body { background: white; font-family: Calibri, sans-serif; }
            .app-header { position: static; box-shadow: none; }
            .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
            .page { padding: 0; }
            @page { size: A4 portrait; margin: 12mm; }

            .print-report-header {
                display: flex !important;
                align-items: center;
                justify-content: space-between;
                border-bottom: 3px solid #1a2b4a;
                padding-bottom: 12px;
                margin-bottom: 18px;
            }
            .print-report-header .co-name {
                font-size: 20px; font-weight: 700; color: #1a2b4a;
            }
            .print-report-header .doc-label {
                font-size: 11px; color: #9ca3af; margin-top: 2px;
            }
            .print-report-header .print-date {
                font-size: 11px; color: #4b5563; text-align: right;
            }
        }

        .print-report-header { display: none; }

        /* ── RECIPIENT SELECTOR ── */
        .recipient-list { display: flex; flex-direction: column; gap: 8px; }
        .recipient-row {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 13px;
            border: 1.5px solid var(--grey-2);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: var(--grey-1);
        }
        .recipient-row:has(input:checked) {
            border-color: var(--blue);
            background: var(--blue-light);
        }
        .recipient-row input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: var(--blue);
            flex-shrink: 0; cursor: pointer;
        }
        .recipient-info { display: flex; flex-direction: column; gap: 1px; }
        .recipient-name { font-size: 13px; font-weight: 600; color: var(--navy); }
        .recipient-num { font-size: 11px; color: var(--grey-3); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
    <div class="logo">A</div>
    <div class="title-block">
        <h1>Attendance Manager</h1>
        <p>Field Attendance Tracking</p>
    </div>
</div>

<!-- SETUP PAGE -->
<div id="loginPage" class="page">
    <div class="card" style="margin-top:10px;">
        <div class="card-title">Initial Setup</div>
        <div class="field"><label>Full Name</label><input type="text" id="name" placeholder="e.g. Tejas Pathak"></div>
        <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@company.com"></div>
        <div class="field"><label>WhatsApp Number</label><input type="text" id="whatsapp" placeholder="+91 98XXXXXXXX"></div>
        <button class="btn btn-primary" onclick="saveUser()">💾 Save &amp; Continue</button>
    </div>
</div>

<!-- MAIN APP PAGE -->
<div id="appPage" class="page hidden">
    <div id="userInfo"></div>
    <div class="card">
        <div class="card-title">Mark Attendance</div>
        <div class="field"><label>Site / Location Description</label><input type="text" id="locationDesc" placeholder="e.g. Innotek Factory – Gate 2"></div>
        <button class="btn btn-wa" onclick="markAttendance()">
            <span>📲</span> Mark Attendance
        </button>
        <button class="btn btn-outline" style="margin-top:10px;" onclick="showReportUI()">
            📋 View Attendance Report
        </button>
    </div>

    <div class="card">
        <div class="card-title">Share Attendance To</div>
        <div class="recipient-list">
            <label class="recipient-row">
                <input type="checkbox" id="rc_sheetal" value="919922924339" checked>
                <div class="recipient-info">
                    <span class="recipient-name">Sheetal Madam</span>
                    <span class="recipient-num">+91 99229 24339</span>
                </div>
            </label>
            <label class="recipient-row">
                <input type="checkbox" id="rc_santosh" value="918180834806">
                <div class="recipient-info">
                    <span class="recipient-name">Santosh Patil</span>
                    <span class="recipient-num">+91 81808 34806</span>
                </div>
            </label>
            <label class="recipient-row">
                <input type="checkbox" id="rc_tejas" value="919823038877">
                <div class="recipient-info">
                    <span class="recipient-name">Tejas Pathak</span>
                    <span class="recipient-num">+91 98230 38877</span>
                </div>
            </label>
        </div>
    </div>
</div>

<!-- REPORT PAGE -->
<div id="reportPage" class="page hidden">

    <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
        <button class="btn btn-pdf" style="flex:1;" onclick="exportPDF()">🖨️ Export PDF</button>
        <button class="btn btn-csv" style="flex:1;" onclick="exportCSV()">📊 Export CSV</button>
        <button class="btn btn-outline" style="flex:1;" onclick="goBack()">← Back</button>
    </div>

    <!-- Date Filter Card -->
    <div class="card">
        <div class="card-title">Date Range Filter</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;">
            <div class="field" style="margin-bottom:0;">
                <label>From</label>
                <input type="date" id="filterFrom">
            </div>
            <div class="field" style="margin-bottom:0;">
                <label>To</label>
                <input type="date" id="filterTo">
            </div>
        </div>
        <button class="btn btn-primary" onclick="applyFilter()">Apply Filter</button>
    </div>

    <div class="card">
        <div id="reportUserBlock"></div>
        <div id="reportMeta" class="report-meta"></div>
        <div id="reportContent"></div>
    </div>
</div>

<div id="toast"></div>

<script>
    if (localStorage.getItem('user')) showDashboard();

    function showToast(msg, duration = 2500) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }

    function saveUser() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const wa = document.getElementById('whatsapp').value.trim();
        if (!name || !email) return showToast('⚠️ Name and email are required.');
        const user = { name, email, whatsapp: wa };
        localStorage.setItem('user', JSON.stringify(user));
        location.reload();
    }

    function getInitials(name) {
        return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function showDashboard() {
        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('appPage').classList.remove('hidden');
        document.getElementById('userInfo').innerHTML = `
            <div class="user-pill">
                <div class="user-avatar">${getInitials(user.name)}</div>
                <div class="user-details">
                    <strong>${user.name}</strong>
                    <span>${user.email} &nbsp;·&nbsp; ${user.whatsapp || 'No WA'}</span>
                </div>
            </div>`;
    }

    function formatDateTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleString('en-IN', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
        });
    }

    function markAttendance() {
        if (!navigator.geolocation) return showToast('⚠️ Geolocation not supported.');
        showToast('📍 Getting your location…');
        navigator.geolocation.getCurrentPosition(pos => {
            const user = JSON.parse(localStorage.getItem('user'));
            const lat = pos.coords.latitude.toFixed(6);
            const lng = pos.coords.longitude.toFixed(6);
            const mapLink = `https://maps.google.com/?q=${lat},${lng}`;
            const now = new Date();
            const entry = {
                time: now.toISOString(),
                desc: document.getElementById('locationDesc').value.trim() || 'N/A',
                lat, lng, link: mapLink
            };

            let logs = JSON.parse(localStorage.getItem('logs') || '[]');
            logs.push(entry);
            localStorage.setItem('logs', JSON.stringify(logs));

            // Formatted WhatsApp message — structured card style
            const dateStr = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

            const msg =
`━━━━━━━━━━━━━━━━━━━━
📋 *ATTENDANCE RECORD*
━━━━━━━━━━━━━━━━━━━━
👤 *Name:*  ${user.name}
🏗️ *Site:*   ${entry.desc}
📅 *Date:*  ${dateStr}
🕐 *Time:*  ${timeStr}
📍 *GPS:*   ${lat}, ${lng}
━━━━━━━━━━━━━━━━━━━━
🗺️ *Map:*
${mapLink}
━━━━━━━━━━━━━━━━━━━━`;

            // Collect selected recipients
            const recipients = [];
            document.querySelectorAll('.recipient-row input[type="checkbox"]:checked').forEach(cb => {
                recipients.push(cb.value);
            });

            if (recipients.length === 0) {
                return showToast('⚠️ Please select at least one recipient.');
            }

            showToast(`✅ Saved! Sending to ${recipients.length} recipient${recipients.length > 1 ? 's' : ''}…`);

            // Send sequentially — open WhatsApp for each number one after another
            let idx = 0;
            function sendNext() {
                if (idx >= recipients.length) return;
                const phone = recipients[idx];
                idx++;
                setTimeout(() => {
                    window.location.href = `whatsapp://send?phone=${phone}&text=${encodeURIComponent(msg)}`;
                    setTimeout(sendNext, 3500);
                }, idx === 1 ? 800 : 0);
            }
            sendNext();

        }, () => showToast('❌ Location access denied. Please allow location.'));
    }

    // ── Filtered logs state ──
    let filteredLogs = [];

    function showReportUI() {
        document.getElementById('appPage').classList.add('hidden');
        document.getElementById('reportPage').classList.remove('hidden');

        // Default filter: current month
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay  = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        document.getElementById('filterFrom').value = firstDay.toISOString().slice(0, 10);
        document.getElementById('filterTo').value   = lastDay.toISOString().slice(0, 10);

        applyFilter();
    }

    function applyFilter() {
        const user = JSON.parse(localStorage.getItem('user'));
        const allLogs = JSON.parse(localStorage.getItem('logs') || '[]');
        const fromVal = document.getElementById('filterFrom').value;
        const toVal   = document.getElementById('filterTo').value;

        const from = fromVal ? new Date(fromVal + 'T00:00:00') : null;
        const to   = toVal   ? new Date(toVal   + 'T23:59:59') : null;

        filteredLogs = allLogs.filter(l => {
            const d = new Date(l.time);
            if (from && d < from) return false;
            if (to   && d > to)   return false;
            return true;
        });

        const today = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' });

        document.getElementById('reportUserBlock').innerHTML = `
            <div class="user-pill" style="margin-bottom:14px;">
                <div class="user-avatar">${getInitials(user.name)}</div>
                <div class="user-details">
                    <strong>${user.name}</strong>
                    <span>${user.email} &nbsp;·&nbsp; ${user.whatsapp || ''}</span>
                </div>
            </div>`;

        const rangeLabel = (fromVal && toVal)
            ? `${new Date(fromVal).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} – ${new Date(toVal).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`
            : today;

        document.getElementById('reportMeta').innerHTML = `
            <div class="meta-box">
                <div class="label">Entries in Range</div>
                <div class="value">${filteredLogs.length}</div>
            </div>
            <div class="meta-box">
                <div class="label">Period</div>
                <div class="value" style="font-size:10px;line-height:1.4;">${rangeLabel}</div>
            </div>`;

        if (filteredLogs.length === 0) {
            document.getElementById('reportContent').innerHTML = `<p style="text-align:center;color:#9ca3af;padding:20px;">No records in this date range.</p>`;
            return;
        }

        let html = `<table class="report-table">
            <tr><th>#</th><th>Date &amp; Time</th><th>Site</th><th>Map Link</th></tr>`;
        filteredLogs.forEach((log, i) => {
            html += `<tr>
                <td style="color:#9ca3af;">${i + 1}</td>
                <td>${formatDateTime(log.time)}</td>
                <td>${log.desc}</td>
                <td style="font-size:11px;"><a href="${log.link}" target="_blank" style="color:#2563eb;font-weight:600;text-decoration:underline;">📍 Open Map</a></td>
            </tr>`;
        });
        html += `</table>`;
        document.getElementById('reportContent').innerHTML = html;
    }

    // ── jsPDF Export ──
    function exportPDF() {
        if (filteredLogs.length === 0) return showToast('⚠️ No records to export.');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Dynamically load jsPDF from CDN
        if (typeof window.jspdf === 'undefined') {
            showToast('⏳ Loading PDF engine…');
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            script.onload = () => buildPDF(user);
            document.head.appendChild(script);
        } else {
            buildPDF(user);
        }
    }

    function buildPDF(user) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        const pageW = 210, pageH = 297;
        const marginL = 12, marginR = 12, marginT = 14, marginB = 14;
        const usableW = pageW - marginL - marginR;

        // ── Colour palette ──
        const navy   = [26,  43,  74];
        const blue   = [37, 99, 235];
        const grey1  = [248,249,251];
        const grey2  = [229,231,235];
        const grey3  = [156,163,175];
        const white  = [255,255,255];
        const black  = [30, 30, 30];

        // ── PAGE 1 HEADER ──
        // Navy banner
        doc.setFillColor(...navy);
        doc.rect(0, 0, pageW, 28, 'F');

        // Title
        doc.setTextColor(...white);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(15);
        doc.text('ATTENDANCE REPORT', marginL, 12);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(147, 197, 253);
        doc.text('Field Attendance Tracking System', marginL, 18);

        // Right side: generated date
        const genDate = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' });
        doc.setTextColor(...white);
        doc.setFontSize(7.5);
        doc.text(`Generated: ${genDate}`, pageW - marginR, 12, { align: 'right' });

        // ── Employee info block ──
        let y = 36;
        doc.setFillColor(...grey1);
        doc.roundedRect(marginL, y, usableW, 20, 2, 2, 'F');
        doc.setDrawColor(...grey2);
        doc.setLineWidth(0.3);
        doc.roundedRect(marginL, y, usableW, 20, 2, 2, 'S');

        // Avatar circle
        doc.setFillColor(...blue);
        doc.circle(marginL + 10, y + 10, 6, 'F');
        const initials = user.name ? user.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : 'U';
        doc.setTextColor(...white);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(7);
        doc.text(initials, marginL + 10, y + 11.5, { align: 'center' });

        doc.setTextColor(...black);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text(user.name || '', marginL + 20, y + 8);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7.5);
        doc.setTextColor(...grey3);
        doc.text(`${user.email || ''}   ·   ${user.whatsapp || ''}`, marginL + 20, y + 14);

        // ── Period + count summary pills ──
        y += 26;
        const fromVal = document.getElementById('filterFrom').value;
        const toVal   = document.getElementById('filterTo').value;
        const rangeText = (fromVal && toVal)
            ? `${new Date(fromVal).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} – ${new Date(toVal).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}`
            : genDate;

        // Pill 1 — entries count
        doc.setFillColor(...blue);
        doc.roundedRect(marginL, y, 44, 14, 2, 2, 'F');
        doc.setTextColor(...white);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(13);
        doc.text(String(filteredLogs.length), marginL + 22, y + 7.5, { align: 'center' });
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(6.5);
        doc.setTextColor(147, 197, 253);
        doc.text('TOTAL ENTRIES', marginL + 22, y + 12, { align: 'center' });

        // Pill 2 — period
        doc.setFillColor(...grey1);
        doc.setDrawColor(...grey2);
        doc.setLineWidth(0.3);
        doc.roundedRect(marginL + 48, y, usableW - 48, 14, 2, 2, 'FD');
        doc.setTextColor(...navy);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(8);
        doc.text('PERIOD', marginL + 52, y + 5.5);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(...black);
        doc.text(rangeText, marginL + 52, y + 11);

        // ── TABLE ──
        y += 20;

        // Column definitions — widths in mm
        // usableW = 186mm. Distribute: #=8, Date=26, Time=20, Site=42, Map=90
        const cols = [
            { label: '#',        w: 8,  key: 'sr'   },
            { label: 'Date',     w: 26, key: 'date'  },
            { label: 'Time',     w: 20, key: 'time'  },
            { label: 'Site',     w: 42, key: 'site'  },
            { label: 'Map Link', w: usableW - 8 - 26 - 20 - 42, key: 'map' },
        ];

        const rowH   = 7;       // mm per row — keeps 30+ per page
        const headH  = 8;
        let   pageNum = 1;

        function drawTableHeader(yPos) {
            let x = marginL;
            doc.setFillColor(...navy);
            doc.rect(x, yPos, usableW, headH, 'F');
            doc.setTextColor(...white);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(7);
            cols.forEach(col => {
                doc.text(col.label, x + 2, yPos + 5.5);
                x += col.w;
            });
            return yPos + headH;
        }

        function drawPageFooter() {
            doc.setDrawColor(...grey2);
            doc.setLineWidth(0.3);
            doc.line(marginL, pageH - marginB - 4, pageW - marginR, pageH - marginB - 4);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(6.5);
            doc.setTextColor(...grey3);
            doc.text('Attendance Manager  ·  Confidential', marginL, pageH - marginB);
            doc.text(`Page ${pageNum}`, pageW - marginR, pageH - marginB, { align: 'right' });
        }

        y = drawTableHeader(y);

        filteredLogs.forEach((log, i) => {
            // Page break check — leave room for footer
            if (y + rowH > pageH - marginB - 8) {
                drawPageFooter();
                doc.addPage();
                pageNum++;
                y = marginT;
                // Repeat mini header on continuation pages
                doc.setFillColor(...navy);
                doc.rect(0, 0, pageW, 10, 'F');
                doc.setTextColor(...white);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(8);
                doc.text('ATTENDANCE REPORT  (continued)', marginL, 7);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(7);
                doc.setTextColor(147, 197, 253);
                doc.text(user.name || '', pageW - marginR, 7, { align: 'right' });
                y = 16;
                y = drawTableHeader(y);
            }

            // Alternating row background
            const isEven = i % 2 === 0;
            doc.setFillColor(...(isEven ? white : grey1));
            doc.rect(marginL, y, usableW, rowH, 'F');

            // Bottom border
            doc.setDrawColor(...grey2);
            doc.setLineWidth(0.2);
            doc.line(marginL, y + rowH, marginL + usableW, y + rowH);

            const d    = new Date(log.time);
            const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
            const timeStr = d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });

            const values = {
                sr:   String(i + 1),
                date: dateStr,
                time: timeStr,
                site: log.desc || 'N/A',
                map:  log.link || '',
            };

            let x = marginL;
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(7);

            cols.forEach(col => {
                const cellW = col.w - 3;
                let text = values[col.key];

                if (col.key === 'sr') {
                    doc.setTextColor(...grey3);
                } else if (col.key === 'map') {
                    // Draw full URL as real clickable hyperlink — font 6 fits ~90mm col
                    doc.setFontSize(6);
                    doc.setTextColor(...blue);
                    // Split URL across 2 lines if still too long (>72 chars)
                    const maxLineChars = 68;
                    if (text.length <= maxLineChars) {
                        doc.textWithLink(text, x + 2, y + 4.8, { url: text });
                    } else {
                        // Break at a natural point (after the ?q= part)
                        const breakAt = text.indexOf('?') > 0 ? text.indexOf('?') + 1 : maxLineChars;
                        const line1 = text.slice(0, breakAt);
                        const line2 = text.slice(breakAt);
                        doc.textWithLink(line1, x + 2, y + 3.2, { url: text });
                        doc.textWithLink(line2, x + 2, y + 6.2, { url: text });
                    }
                    doc.setFontSize(7);
                    x += col.w;
                    doc.setTextColor(...black);
                    return;
                } else {
                    doc.setTextColor(...black);
                }

                // Truncate to fit cell width
                const maxChars = Math.floor(cellW / 1.7);
                if (text.length > maxChars) text = text.slice(0, maxChars - 1) + '…';
                doc.text(text, x + 2, y + 4.8);
                x += col.w;
            });

            y += rowH;
        });

        drawPageFooter();

        // ── Save ──
        const fname = `Attendance_${(user.name || 'Report').replace(/ /g,'_')}_${fromVal || 'all'}.pdf`;
        doc.save(fname);
        showToast('✅ PDF downloaded!');
    }

    function exportCSV() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (filteredLogs.length === 0) return showToast('⚠️ No records to export.');
        let csv = `Attendance Report — ${user.name}\nGenerated: ${new Date().toLocaleString('en-IN')}\n\n`;
        csv += 'Sr,Date & Time,Site,Latitude,Longitude,Map Link\n';
        filteredLogs.forEach((l, i) => {
            // Use =HYPERLINK() formula so Excel/Numbers renders it as a clickable link
            csv += `${i+1},"${formatDateTime(l.time)}","${l.desc}","${l.lat || ''}","${l.lng || ''}","=HYPERLINK(""${l.link}"",""Open Map"")"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `attendance_${user.name?.replace(/ /g, '_') || 'report'}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function goBack() {
        document.getElementById('reportPage').classList.add('hidden');
        document.getElementById('appPage').classList.remove('hidden');
    }
</script>
</body>
