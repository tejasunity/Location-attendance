<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Manager</title>
    <style>
        body { font-family: Calibri, sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .hidden { display: none; }
        .static-info { background: #f9f9f9; padding: 10px; border-left: 4px solid #007bff; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Initial Setup</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="whatsapp" placeholder="WhatsApp Number">
        <button onclick="saveUser()">Save & Continue</button>
    </div>

    <div id="appPage" class="hidden">
        <div class="card">
            <h3>User Profile</h3>
            <div id="profileView" class="static-info"></div>
            <hr>
            <input type="text" id="locationDesc" placeholder="Where am I? (e.g. Site Office)">
            <button class="btn-wa" onclick="markAttendance()">Mark Attendance & Share</button>
            <button onclick="showReportUI()">Generate Report</button>
        </div>
    </div>

    <div id="reportPage" class="hidden">
        <div class="card">
            <h3>Date Range</h3>
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button onclick="generateReport()">Apply Filter</button>
            <button style="background: #6c757d;" onclick="window.print()">Print/Save as PDF</button>
            <button style="background: #dc3545;" onclick="goBack()">Back</button>
        </div>
        <div id="reportContent"></div>
    </div>

    <script>
        let currentPos = null;

        if (localStorage.getItem('user')) {
            showDashboard();
            requestLocPermission();
        }

        function requestLocPermission() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => { currentPos = pos; }, null, { enableHighAccuracy: true });
            }
        }

        function saveUser() {
            const user = { 
                name: document.getElementById('name').value, 
                email: document.getElementById('email').value, 
                whatsapp: document.getElementById('whatsapp').value 
            };
            localStorage.setItem('user', JSON.stringify(user));
            showDashboard();
            requestLocPermission();
        }

        function showDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('profileView').innerHTML = `
                <strong>Name:</strong> ${user.name}<br>
                <strong>Email:</strong> ${user.email}<br>
                <strong>WhatsApp:</strong> ${user.whatsapp}
            `;
        }

        function markAttendance() {
            if (!currentPos) { alert("Location not ready. Please try again."); return; }
            const user = JSON.parse(localStorage.getItem('user'));
            const desc = document.getElementById('locationDesc').value || 'N/A';
            const mapLink = `https://www.google.com/maps?q=${currentPos.coords.latitude},${currentPos.coords.longitude}`;
            
            const entry = { timestamp: new Date().toISOString(), date: new Date().toLocaleDateString(), name: user.name, desc: desc, link: mapLink };
            let logs = JSON.parse(localStorage.getItem('logs') || '[]');
            logs.push(entry);
            localStorage.setItem('logs', JSON.stringify(logs));
            
            // Uneditable "Card" format for WhatsApp
            const msg = `*ATTENDANCE CARD*\n--------------------\n*Name:* ${user.name}\n*Site:* ${desc}\n*Date:* ${entry.date}\n*Location:* ${mapLink}\n--------------------`;
            window.open(`https://wa.me/9823038877?text=${encodeURIComponent(msg)}`);
        }

        function showReportUI() {
            document.getElementById('appPage').classList.add('hidden');
            document.getElementById('reportPage').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('reportPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
        }

        function generateReport() {
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            let html = `<table><tr><th>Date</th><th>Name</th><th>Location</th><th>Link</th></tr>`;
            logs.forEach(log => {
                html += `<tr><td>${log.date}</td><td>${log.name}</td><td>${log.desc}</td><td><a href="${log.link}" target="_blank">Map</a></td></tr>`;
            });
            html += `</table>`;
            document.getElementById('reportContent').innerHTML = html;
        }
    </script>
</body>
</html>
