<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Manager</title>
    <style>
        body { font-family: Calibri, sans-serif; padding: 15px; background: #fdfdfd; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .hidden { display: none; }
        #reportTable { width: 100%; border-collapse: collapse; margin-top: 20px; }
        #reportTable th, #reportTable td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        @media print {
            body { font-family: Calibri, sans-serif; }
            .no-print { display: none; }
            @page { size: A4 portrait; margin: 20mm; }
        }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Initial Setup</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="whatsapp" placeholder="WhatsApp Number">
        <button onclick="saveUser()">Save & Continue</button>
    </div>

    <div id="appPage" class="hidden">
        <div class="card">
            <h3>Welcome, <span id="displayName"></span></h3>
            <input type="text" id="locationDesc" placeholder="Where am I? (e.g. Site Office)">
            <button class="btn-wa" onclick="markAttendance()">Mark Attendance & Share</button>
            <button onclick="showReportUI()">Generate Report</button>
        </div>
    </div>

    <div id="reportPage" class="hidden">
        <div class="card no-print">
            <h3>Date Range</h3>
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button onclick="generateReport()">Apply Filter</button>
            <button style="background: #6c757d;" onclick="window.print()">Print/Save as PDF</button>
            <button style="background: #dc3545;" onclick="goBack()">Back to Dashboard</button>
        </div>
        <div id="reportContent"></div>
    </div>

    <script>
        if (localStorage.getItem('user')) {
            showDashboard();
        }

        function saveUser() {
            const name = document.getElementById('name').value;
            if(!name) return alert("Please enter your name");
            const user = { 
                name: name, 
                email: document.getElementById('email').value, 
                whatsapp: document.getElementById('whatsapp').value 
            };
            localStorage.setItem('user', JSON.stringify(user));
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('reportPage').classList.add('hidden');
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('displayName').innerText = user.name;
        }

        function markAttendance() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    // Corrected the link syntax below
                    const link = `https://www.google.com/maps?q=${lat},${lon}`;
                    const entry = {
                        timestamp: new Date().toISOString(),
                        date: new Date().toLocaleDateString(),
                        desc: document.getElementById('locationDesc').value || 'Location Recorded',
                        link: link
                    };
                    
                    let logs = JSON.parse(localStorage.getItem('logs') || '[]');
                    logs.push(entry);
                    localStorage.setItem('logs', JSON.stringify(logs));
                    
                    const msg = `Attendance Log: ${entry.desc} | Location: ${link}`;
                    window.open(`https://wa.me/9823038877?text=${encodeURIComponent(msg)}`);
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function showReportUI() {
            document.getElementById('appPage').classList.add('hidden');
            document.getElementById('reportPage').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('reportPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
        }

        function generateReport() {
            const startVal = document.getElementById('startDate').value;
            const endVal = document.getElementById('endDate').value;
            const start = startVal ? new Date(startVal) : null;
            const end = endVal ? new Date(endVal) : null;
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            
            let html = `<h3>Attendance Report</h3><table id="reportTable"><tr><th>Date</th><th>Location</th><th>Map</th></tr>`;
            
            logs.forEach(log => {
                const logDate = new Date(log.timestamp);
                if ((!start || logDate >= start) && (!end || logDate <= end)) {
                    html += `<tr><td>${log.date}</td><td>${log.desc}</td><td><a href="${log.link}" target="_blank">View</a></td></tr>`;
                }
            });
            html += `</table>`;
            document.getElementById('reportContent').innerHTML = html;
        }
    </script>
</body>
</html>
