<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Manager</title>
    <style>
        body { font-family: Calibri, sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .hidden { display: none; }
        .static-info { background: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Initial Setup</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="text" id="whatsapp" placeholder="WhatsApp Number">
        <button onclick="saveUser()">Save & Continue</button>
    </div>

    <div id="appPage" class="hidden">
        <div class="card">
            <h3>Identity Verified</h3>
            <div id="profileView" class="static-info"></div>
            <hr>
            <input type="text" id="locationDesc" placeholder="Site Location (e.g. Dam Site)">
            <button class="btn-wa" id="attendanceBtn" onclick="markAttendance()">Mark & Lock Attendance</button>
            <button onclick="showReportUI()">Generate Report</button>
        </div>
    </div>

    <div id="reportPage" class="hidden">
        <div class="card">
            <h3>Attendance Records</h3>
            <button style="background: #6c757d;" onclick="window.print()">Export/Print PDF</button>
            <button style="background: #dc3545;" onclick="goBack()">Back</button>
        </div>
        <div id="reportContent"></div>
    </div>

    <script>
        let currentPos = null;

        if (localStorage.getItem('user')) {
            showDashboard();
            navigator.geolocation.getCurrentPosition(pos => { currentPos = pos; }, null, { enableHighAccuracy: true });
        }

        function saveUser() {
            const user = { name: document.getElementById('name').value, email: document.getElementById('email').value, whatsapp: document.getElementById('whatsapp').value };
            localStorage.setItem('user', JSON.stringify(user));
            location.reload();
        }

        function showDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.getElementById('profileView').innerHTML = `<strong>${user.name}</strong><br>${user.email}<br>${user.whatsapp}`;
        }

        function markAttendance() {
            if (!currentPos) { alert("Location not ready. Please refresh."); return; }
            const user = JSON.parse(localStorage.getItem('user'));
            const desc = document.getElementById('locationDesc').value || 'General Site';
            
            const lat = currentPos.coords.latitude;
            const lon = currentPos.coords.longitude;
            const mapURL = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const entry = { timestamp: new Date().toLocaleString(), name: user.name, desc: desc, link: mapURL };
            let logs = JSON.parse(localStorage.getItem('logs') || '[]');
            logs.push(entry);
            localStorage.setItem('logs', JSON.stringify(logs));
            
            // The WhatsApp message now uses the friendly text
            const msg = `*OFFICIAL ATTENDANCE LOG*\n--------------------\n*Name:* ${entry.name}\n*Site:* ${entry.desc}\n*Time:* ${entry.timestamp}\n*Location:* [Click here to view site location](${entry.link})\n--------------------\n_System Generated: Non-Editable_`;
            
            window.open(`https://wa.me/9823038877?text=${encodeURIComponent(msg)}`);
            alert("Attendance recorded successfully.");
        }

        function showReportUI() {
            document.getElementById('appPage').classList.add('hidden');
            document.getElementById('reportPage').classList.remove('hidden');
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            let html = `<table><tr><th>Time</th><th>Site</th><th>Map</th></tr>`;
            logs.forEach(log => {
                html += `<tr><td>${log.timestamp}</td><td>${log.desc}</td><td><a href="${log.link}" target="_blank">View Map</a></td></tr>`;
            });
            html += `</table>`;
            document.getElementById('reportContent').innerHTML = html;
        }

        function goBack() {
            document.getElementById('reportPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
        }
    </script>
</body>
</html>
